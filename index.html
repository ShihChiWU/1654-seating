<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1654班 座位排位戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei'; }
        
        .student-card {
            cursor: grab;
            transition: transform 0.1s;
        }
        .student-card:active {
            cursor: grabbing;
            transform: scale(0.95);
        }
        
        .seat {
            transition: all 0.2s ease;
        }
        .seat.drag-over {
            background-color: #e2e8f0; /* bg-gray-200 */
            border-color: #94a3b8;
            transform: scale(1.02);
        }
        
        /* Locked seat styling */
        .seat.locked {
            background-color: #f1f5f9;
            border-color: #ef4444; /* red border */
            border-style: solid;
        }
        .seat.locked .student-card {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Scrollbar styling for the pool */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-800 text-white shadow-md p-4 flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-2">
                🏆 1654班 座位排位戰 <span class="text-sm font-normal bg-indigo-600 px-2 py-1 rounded-full ml-2">大魔王特權版</span>
            </h1>
            <p class="text-indigo-200 text-sm mt-1 flex items-center gap-2">
                積分越高，權力越大！不到最後一刻，位子都不是你的。
                <span id="sync-status" class="text-xs bg-gray-500 text-white px-2 py-0.5 rounded-full">資料未同步</span>
            </p>
        </div>
        <div class="flex gap-3">
            <button id="sync-btn" onclick="syncScores()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded shadow flex items-center gap-2 transition-colors">
                ☁️ 雲端同步積分
            </button>
            <button onclick="randomizeSeats()" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2 px-4 rounded shadow flex items-center gap-2 transition-colors">
                🎲 第一階段：亂數初稿
            </button>
            <button onclick="clearSeats()" class="bg-white hover:bg-gray-100 text-indigo-800 font-bold py-2 px-4 rounded shadow transition-colors">
                🔄 清空座位
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        
        <!-- Left: Student Pool -->
        <section class="w-1/4 bg-white rounded-lg shadow-md flex flex-col overflow-hidden border border-gray-200">
            <div class="bg-gray-50 border-b p-3">
                <h2 class="font-bold text-gray-700 flex justify-between items-center">
                    待選區 (學生名單)
                    <span id="pool-count" class="bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded-full">37人</span>
                </h2>
                <div class="text-xs text-gray-500 mt-1 flex gap-2">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-400"></span>Top 10</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-yellow-400"></span>中段班</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-400"></span>Bottom 10</span>
                </div>
            </div>
            
            <!-- Draggable Pool -->
            <div id="student-pool" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-gray-50 drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Students will be injected here by JS -->
            </div>
        </section>

        <!-- Right: Classroom Grid -->
        <section class="w-3/4 bg-white rounded-lg shadow-md flex flex-col border border-gray-200 relative">
            <!-- Blackboard -->
            <div class="w-2/3 mx-auto mt-4 h-12 bg-slate-800 rounded-b-xl shadow-inner border-b-8 border-slate-700 flex items-center justify-center text-white/50 tracking-widest font-bold">
                講 台
            </div>
            
            <div class="flex-1 p-6 flex items-stretch justify-center gap-6">
                <!-- Classroom Grid Container -->
                <div id="classroom-grid" class="grid gap-3 w-full max-w-4xl">
                    <!-- Grid generated by JS -->
                </div>
                <!-- Hallway Indicator -->
                <div class="w-12 bg-orange-50/80 border-2 border-orange-200 rounded-lg flex items-center justify-center text-orange-800/60 font-bold text-xl tracking-[0.5em] shadow-inner" style="writing-mode: vertical-rl;">
                    走廊
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- 1. Student Data ---
        // 預設資料 (已根據最新 PDF 紀錄表校正)
        const studentsData = [
            { id: 32, name: '劉守圃', score: 135 },
            { id: 34, name: '蔡允弘', score: 130 },
            { id: 16, name: '張可承', score: 125 },
            { id: 24, name: '陳威辰', score: 125 },
            { id: 2, name: '王植君', score: 115 },
            { id: 30, name: '黃宇佑', score: 115 },
            { id: 29, name: '馮書瑋', score: 110 },
            { id: 18, name: '許凱翔', score: 105 },
            { id: 37, name: '謝宗哲', score: 105 },
            { id: 7, name: '宋弈廷', score: 100 }, 
            { id: 11, name: '林秉毅', score: 100 },
            { id: 15, name: '翁煜凱', score: 100 },
            { id: 23, name: '陳則宇', score: 100 },
            { id: 12, name: '邱柏崴', score: 95 },
            { id: 14, name: '徐子鈞', score: 95 },
            { id: 19, name: '郭芳魁', score: 95 },
            { id: 20, name: '郭冠佑', score: 95 },
            { id: 22, name: '陳泊翰', score: 95 },
            { id: 25, name: '陳朗平', score: 95 },
            { id: 28, name: '彭存信', score: 95 },
            { id: 36, name: '鄧昭亮', score: 95 },
            { id: 3, name: '田建鋐', score: 90 },
            { id: 9, name: '阮復從', score: 90 },
            { id: 21, name: '陳元泓', score: 90 },
            { id: 26, name: '陳輊勛', score: 90 },
            { id: 31, name: '鄒鎧鴻', score: 90 },
            { id: 38, name: '鍾季廷', score: 90 }, 
            { id: 1, name: '王立雍', score: 85 },  
            { id: 8, name: '李振榆', score: 85 },
            { id: 17, name: '張鈞詠', score: 85 },
            { id: 33, name: '劉彥呈', score: 85 },
            { id: 5, name: '何懋霆', score: 80 },
            { id: 6, name: '吳囷融', score: 80 },
            { id: 10, name: '周敬栩', score: 80 },
            { id: 13, name: '邱鈺勛', score: 80 },
            { id: 27, name: '陳耀丞', score: 75 },
            { id: 35, name: '蔡明宏', score: 75 }   
        ];

        // --- 1.5. Sync with Google Sheets ---
        async function syncScores(isManual = true) {
            const btn = document.getElementById('sync-btn');
            const statusBadge = document.getElementById('sync-status');
            const originalText = btn.innerHTML;
            
            if (isManual) {
                btn.innerHTML = '⏳ 同步中...';
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
            }
            statusBadge.innerText = '⏳ 連線中...';
            statusBadge.className = 'text-xs bg-yellow-500 text-white px-2 py-0.5 rounded-full';

            try {
                // 【核心修正】: 更新了最新的 Google 試算表 ID，並強制指定讀取「1654積分表」分頁
                const sheetId = '1crAqLb_zEBs30l5kXZqzY3o828AUbZg8Lxk6VrWLLYU';
                const sheetName = encodeURIComponent('1654積分表');
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response error');
                
                const text = await response.text();
                
                // 處理 Google API 回傳的 JSONP 格式
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                
                let idIdx = -1, nameIdx = -1, scoreIdx = -1;
                
                // 尋找對應的欄位標題 (headers)
                if (data.table.cols) {
                    data.table.cols.forEach((col, idx) => {
                        if (col && typeof col.label === 'string') {
                            const lbl = col.label.replace(/\s+/g, '');
                            if (lbl.includes('座號')) idIdx = idx;
                            if (lbl.includes('姓名')) nameIdx = idx;
                            
                            // 嚴格比對，完全避開「原始積分」
                            if (lbl === '總分' || lbl === '積分' || lbl === '合計' || lbl === '總積分') {
                                scoreIdx = idx;
                            }
                        }
                    });

                    // 如果沒找到精確的，找包含積分且「不含原始」的欄位
                    if (scoreIdx === -1) {
                        data.table.cols.forEach((col, idx) => {
                            if (col && typeof col.label === 'string') {
                                const lbl = col.label.replace(/\s+/g, '');
                                if (lbl.includes('積分') && !lbl.includes('原始')) scoreIdx = idx;
                            }
                        });
                    }
                }

                // 備用方案：掃描前 5 列資料尋找標題
                let startRow = 0;
                if (idIdx === -1 || nameIdx === -1 || scoreIdx === -1) {
                    for(let r = 0; r < Math.min(5, data.table.rows.length); r++) {
                        const row = data.table.rows[r];
                        if(!row || !row.c) continue;
                        let tempId = -1, tempName = -1, tempScore = -1;
                        row.c.forEach((cell, idx) => {
                            if (cell && typeof cell.v === 'string') {
                                const lbl = cell.v.replace(/\s+/g, '');
                                if (lbl.includes('座號')) tempId = idx;
                                if (lbl.includes('姓名')) tempName = idx;
                                if (lbl === '總分' || lbl === '積分' || lbl === '合計') tempScore = idx;
                            }
                        });
                        if (tempScore === -1) {
                            row.c.forEach((cell, idx) => {
                                if (cell && typeof cell.v === 'string') {
                                    const lbl = cell.v.replace(/\s+/g, '');
                                    if (lbl.includes('積分') && !lbl.includes('原始')) tempScore = idx;
                                }
                            });
                        }
                        if (tempId !== -1 && tempName !== -1 && tempScore !== -1) {
                            idIdx = tempId; nameIdx = tempName; scoreIdx = tempScore;
                            startRow = r + 1; // 資料從標題的下一列開始
                            break;
                        }
                    }
                }

                // 如果還是找不到分數，強制抓取表格的「最後一欄」
                if (scoreIdx === -1 && data.table.cols) {
                    scoreIdx = data.table.cols.length - 1;
                    console.warn("找不到明確的積分標題，強制抓取最後一欄當作總分");
                }

                if (idIdx === -1 || nameIdx === -1) {
                    throw new Error('找不到指定的欄位標題(座號、姓名)');
                }

                const updatedStudents = [];
                for (let i = startRow; i < data.table.rows.length; i++) {
                    const row = data.table.rows[i];
                    if (!row || !row.c) continue;
                    
                    const idCell = row.c[idIdx];
                    if (!idCell || idCell.v === null) continue;
                    let id = parseInt(String(idCell.v).replace(/\D/g, ''));
                    
                    const nameCell = row.c[nameIdx];
                    let name = (nameCell && nameCell.v) ? String(nameCell.v).trim() : '';
                    
                    const scoreCell = row.c[scoreIdx];
                    let score = 0;
                    if (scoreCell && (scoreCell.v !== null || scoreCell.f !== null)) {
                        const val = scoreCell.v !== null ? scoreCell.v : scoreCell.f;
                        score = typeof val === 'number' ? val : parseInt(String(val).replace(/[^\d.-]/g, ''));
                    }
                    
                    // 確保讀取到的資料是有效的 (名字不為空、分數與座號皆為數字)
                    if (!isNaN(id) && name && !isNaN(score)) {
                        updatedStudents.push({ id, name, score });
                    }
                }

                if (updatedStudents.length === 0) throw new Error('沒有讀取到任何學生資料');

                // 重新依照總分由高至低排序
                updatedStudents.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.id - b.id; // 同分則依座號由小到大排序
                });

                // 更新全域變數
                studentsData.length = 0;
                updatedStudents.forEach(s => studentsData.push(s));

                // 更新畫面上所有的卡片
                updateCardsAfterSync();
                
                statusBadge.innerText = '🟢 已同步【1654積分表】';
                statusBadge.className = 'text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full shadow';
                
                if (isManual) alert('✅ 積分同步成功！\n已從 Google 表單【1654積分表】抓取最新分數，全班排名與顏色階級已自動更新。');
                console.log("Scores synced successfully from Google Sheets.");

            } catch (error) {
                console.error(error);
                statusBadge.innerText = '🔴 同步失敗(使用預設資料)';
                statusBadge.className = 'text-xs bg-red-500 text-white px-2 py-0.5 rounded-full';
                
                if (isManual) {
                    alert('❌ 同步失敗。\n\n請確認：\n1. 您的 Google 試算表共用權限已設定為「知道連結的任何人均可檢視」。\n2. 表單分頁名稱必須包含正確資料。');
                } else {
                    console.warn("Auto-sync failed. Using default hardcoded scores.");
                }
            } finally {
                if (isManual) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            }
        }

        function updateCardsAfterSync() {
            const pool = document.getElementById('student-pool');
            
            studentsData.forEach((student, index) => {
                const card = document.getElementById(`student-${student.id}`);
                if (card) {
                    // 更新分數文字
                    const scoreEl = card.querySelector('.font-black');
                    if (scoreEl) scoreEl.innerText = student.score;

                    // 更新顏色與階級 (不管在座位上還是待選區都會變色)
                    const colorClasses = getColorClasses(index);
                    card.className = `student-card w-full ${colorClasses} border-2 rounded-md p-2 flex justify-between items-center shadow-sm relative z-0`;
                    
                    // 如果卡片還在左側待選區，將它重新加入以達成「視覺排序」
                    if (card.parentNode === pool) {
                        pool.appendChild(card);
                    }
                } else {
                    // 如果原本沒有這張卡片 (例如有新同學)，則動態新增
                    const newCard = document.createElement('div');
                    newCard.id = `student-${student.id}`;
                    newCard.draggable = true;
                    newCard.setAttribute('ondragstart', 'drag(event)');
                    newCard.setAttribute('ondragend', 'dragEnd(event)');
                    const colorClasses = getColorClasses(index);
                    newCard.className = `student-card w-full ${colorClasses} border-2 rounded-md p-2 flex justify-between items-center shadow-sm relative z-0`;
                    newCard.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold opacity-60 w-5">${student.id}</span>
                            <span class="font-bold text-base tracking-widest">${student.name}</span>
                        </div>
                        <div class="font-black bg-white/50 px-2 py-0.5 rounded text-sm">
                            ${student.score}
                        </div>
                    `;
                    pool.appendChild(newCard);
                }
            });
            updatePoolCount();
        }

        // --- 2. Classroom Layout Definition ---
        // 1 = Seat, 0 = Empty Space (Aisle/Missing desk)
        // 依照: 講台在上，走廊在右側。從右上數來共7個直排。
        // 第1排(右1): 1無, 2-6有 (5)
        // 第2排(右2): 1無, 2-6有 (5)
        // 第3,4,5排(右3-5): 1-6有 (18)
        // 第6排(右6): 1無, 2-6有 (5)
        // 第7排(右7): 1無, 2-5有, 6無 (4)
        const layout = [
            [0, 0, 1, 1, 1, 0, 0], // 第一橫列 (靠近講台：右3,右4,右5有桌子)
            [1, 1, 1, 1, 1, 1, 1], // 第二橫列
            [1, 1, 1, 1, 1, 1, 1], // 第三橫列
            [1, 1, 1, 1, 1, 1, 1], // 第四橫列
            [1, 1, 1, 1, 1, 1, 1], // 第五橫列
            [0, 1, 1, 1, 1, 1, 1]  // 第六橫列 (靠近後門：右7無，其餘皆有)
        ];

        // --- 3. Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initGrid();
            initPool();
            
            // 網頁載入時，自動嘗試背景同步 Google 表單的最新分數
            syncScores(false);
        });

        function initGrid() {
            const gridContainer = document.getElementById('classroom-grid');
            gridContainer.style.gridTemplateColumns = `repeat(7, minmax(0, 1fr))`;
            
            let seatIndex = 1;
            layout.forEach((row, rIdx) => {
                row.forEach((col, cIdx) => {
                    if (col === 1) {
                        // Create a valid seat
                        const seat = document.createElement('div');
                        seat.id = `seat-${rIdx}-${cIdx}`;
                        seat.className = `seat drop-zone relative border-2 border-dashed border-gray-300 rounded-lg h-20 bg-gray-50 flex items-center justify-center p-1`;
                        seat.setAttribute('ondrop', 'drop(event)');
                        seat.setAttribute('ondragover', 'allowDrop(event)');
                        seat.setAttribute('ondragenter', 'dragEnter(event)');
                        seat.setAttribute('ondragleave', 'dragLeave(event)');
                        
                        // Add Lock Button
                        const lockBtn = document.createElement('button');
                        lockBtn.className = 'absolute -top-2 -right-2 w-6 h-6 bg-white border border-gray-200 rounded-full shadow hover:bg-gray-100 flex items-center justify-center text-xs z-10 transition-colors';
                        lockBtn.innerHTML = '🔓';
                        lockBtn.title = "點擊鎖定座位 (大魔王專用)";
                        lockBtn.onclick = (e) => toggleLock(e, seat.id, lockBtn);
                        
                        seat.appendChild(lockBtn);
                        gridContainer.appendChild(seat);
                        seatIndex++;
                    } else {
                        // Create empty space (aisle)
                        const empty = document.createElement('div');
                        gridContainer.appendChild(empty);
                    }
                });
            });
        }

        function getColorClasses(rankIndex) {
            // Top 10 (index 0-9)
            if (rankIndex < 10) return 'bg-blue-100 border-blue-400 text-blue-900 shadow-blue-200/50';
            // Bottom 10 (index 27-36)
            if (rankIndex >= 27) return 'bg-red-100 border-red-400 text-red-900 shadow-red-200/50';
            // Middle
            return 'bg-yellow-100 border-yellow-400 text-yellow-900 shadow-yellow-200/50';
        }

        function initPool() {
            const pool = document.getElementById('student-pool');
            pool.innerHTML = '';
            
            studentsData.forEach((student, index) => {
                const card = document.createElement('div');
                card.id = `student-${student.id}`;
                card.draggable = true;
                card.setAttribute('ondragstart', 'drag(event)');
                card.setAttribute('ondragend', 'dragEnd(event)');
                
                const colorClasses = getColorClasses(index);
                card.className = `student-card w-full ${colorClasses} border-2 rounded-md p-2 flex justify-between items-center shadow-sm relative z-0`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold opacity-60 w-5">${student.id}</span>
                        <span class="font-bold text-base tracking-widest">${student.name}</span>
                    </div>
                    <div class="font-black bg-white/50 px-2 py-0.5 rounded text-sm">
                        ${student.score}
                    </div>
                `;
                pool.appendChild(card);
            });
            updatePoolCount();
        }

        // --- 4. Drag and Drop Logic ---
        let draggedElement = null;

        function drag(ev) {
            // Check if parent seat is locked
            const parentSeat = ev.target.closest('.seat');
            if (parentSeat && parentSeat.classList.contains('locked')) {
                ev.preventDefault();
                return; // Cannot drag from a locked seat
            }

            draggedElement = ev.target;
            ev.dataTransfer.setData("text", ev.target.id);
            ev.dataTransfer.effectAllowed = "move";
            setTimeout(() => { ev.target.classList.add('opacity-40'); }, 0);
        }

        function dragEnd(ev) {
            ev.target.classList.remove('opacity-40');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedElement = null;
        }

        function allowDrop(ev) {
            const dropZone = ev.target.closest('.drop-zone');
            if (!dropZone) return;
            
            // Prevent dropping into a locked seat
            if (dropZone.classList.contains('locked')) return;
            
            ev.preventDefault();
            ev.dataTransfer.dropEffect = "move";
        }

        function dragEnter(ev) {
            const dropZone = ev.target.closest('.seat');
            if (dropZone && !dropZone.classList.contains('locked')) {
                dropZone.classList.add('drag-over');
            }
        }

        function dragLeave(ev) {
            const dropZone = ev.target.closest('.seat');
            if (dropZone) {
                dropZone.classList.remove('drag-over');
            }
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedNode = document.getElementById(data);
            
            if (!draggedNode) return;

            let dropZone = ev.target.closest('.drop-zone');
            if (!dropZone) return;

            dropZone.classList.remove('drag-over');

            // Prevent action if drop zone is locked
            if (dropZone.classList.contains('locked')) return;

            // Scenario 1: Dropping onto the pool
            if (dropZone.id === 'student-pool') {
                dropZone.appendChild(draggedNode);
            } 
            // Scenario 2: Dropping onto a seat
            else if (dropZone.classList.contains('seat')) {
                // Find if there is already a student in this seat
                const existingStudent = dropZone.querySelector('.student-card');
                
                if (existingStudent && existingStudent !== draggedNode) {
                    // SWAP LOGIC
                    const originalParent = draggedNode.parentNode;
                    originalParent.appendChild(existingStudent); // Move existing to origin
                }
                
                dropZone.appendChild(draggedNode); // Place dragged into new seat
            }
            
            updatePoolCount();
        }

        // --- 5. Interactive Features ---
        
        function toggleLock(ev, seatId, btnElement) {
            ev.stopPropagation(); // Prevent triggering drag events
            const seat = document.getElementById(seatId);
            
            // Only allow locking if someone is sitting there
            const hasStudent = seat.querySelector('.student-card');
            
            if (seat.classList.contains('locked')) {
                seat.classList.remove('locked');
                btnElement.innerHTML = '🔓';
                btnElement.classList.remove('bg-red-100', 'border-red-400');
            } else {
                if(!hasStudent) {
                    // Flash red to indicate error (can't lock empty seat)
                    seat.classList.add('bg-red-50');
                    setTimeout(()=>seat.classList.remove('bg-red-50'), 300);
                    return;
                }
                seat.classList.add('locked');
                btnElement.innerHTML = '🔒';
                btnElement.classList.add('bg-red-100', 'border-red-400');
            }
        }

        function clearSeats() {
            if(confirm("確定要將所有同學退回待選區嗎？(將解除所有鎖定)")) {
                const seats = document.querySelectorAll('.seat');
                const pool = document.getElementById('student-pool');
                
                seats.forEach(seat => {
                    // Remove locks
                    seat.classList.remove('locked');
                    const btn = seat.querySelector('button');
                    if(btn) {
                        btn.innerHTML = '🔓';
                        btn.classList.remove('bg-red-100', 'border-red-400');
                    }
                    
                    // Move students back to pool
                    const student = seat.querySelector('.student-card');
                    if (student) pool.appendChild(student);
                });
                
                // Re-sort the pool to original state (by score)
                const cards = Array.from(pool.querySelectorAll('.student-card'));
                cards.sort((a, b) => {
                    const scoreA = parseInt(a.querySelector('.font-black').innerText);
                    const scoreB = parseInt(b.querySelector('.font-black').innerText);
                    if (scoreB !== scoreA) return scoreB - scoreA;
                    return parseInt(a.querySelector('span').innerText) - parseInt(b.querySelector('span').innerText);
                });
                cards.forEach(card => pool.appendChild(card));
                
                updatePoolCount();
            }
        }

        function randomizeSeats() {
            // Gather all available students and available seats
            const allStudents = Array.from(document.querySelectorAll('.student-card'));
            const allSeats = Array.from(document.querySelectorAll('.seat:not(.locked)'));
            
            if (allStudents.length === 0) return;

            // Shuffle students array (Fisher-Yates)
            for (let i = allStudents.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allStudents[i], allStudents[j]] = [allStudents[j], allStudents[i]];
            }

            // Assign randomly
            let studentIdx = 0;
            allSeats.forEach(seat => {
                // Only place if seat is completely empty (no locked, no existing student)
                // Actually randomize overwrites non-locked seats.
                const existing = seat.querySelector('.student-card');
                if (existing) {
                    document.getElementById('student-pool').appendChild(existing);
                }
                
                if (studentIdx < allStudents.length) {
                    seat.appendChild(allStudents[studentIdx]);
                    studentIdx++;
                }
            });
            
            // Move any leftovers to pool
            while (studentIdx < allStudents.length) {
                document.getElementById('student-pool').appendChild(allStudents[studentIdx]);
                studentIdx++;
            }
            
            updatePoolCount();
        }
        
        function updatePoolCount() {
            const count = document.getElementById('student-pool').querySelectorAll('.student-card').length;
            document.getElementById('pool-count').innerText = `${count}人`;
        }
    </script>
